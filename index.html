<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест: Боец vs Стресс</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Model Viewer -->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #1a2a2a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .fighter-test {
            position: relative;
            width: 100%;
            max-width: 1200px;
            height: 700px;
            background: linear-gradient(145deg, #1e2f2f 0%, #142020 100%);
            border-radius: 60px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }
        
        /* ИНДИКАТОР ЗАГРУЗКИ */
        .loader-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #1e2f2f 0%, #142020 100%);
            z-index: 100;
            transition: opacity 0.5s ease;
        }
        
        .loader-text {
            color: white;
            font-size: 1.5rem;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        
        .loader-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #0ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* КОНТЕЙНЕР МОДЕЛИ */
        .fighter-container {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 700px;
            height: 900px;
            z-index: 10;
            filter: drop-shadow(0 0 30px rgba(0, 255, 255, 0.3));
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        .fighter-container.loaded {
            opacity: 1;
        }
        
        model-viewer {
            width: 100%;
            height: 100%;
            --poster-color: transparent;
            --progress-bar-color: transparent;
            background: transparent;
        }
        
        /* БЛОКИ (изначально скрыты) */
        .target {
            position: absolute;
            min-width: 120px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 15px 25px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 3px solid;
            opacity: 0;
            z-index: 20;
            transition: opacity 0.3s;
        }
        
        .target-1 {
            left: 15%;
            top: 30%;
            border-color: #ff4d4d;
        }
        
        .target-2 {
            right: 15%;
            top: 60%;
            border-color: #4da6ff;
        }
        
        /* АНИМАЦИИ ВЫЛЕТА */
        @keyframes targetLeft {
            0% { opacity: 0; transform: translateX(-100px) scale(0.3); }
            50% { opacity: 1; transform: translateX(10px) scale(1.1); }
            100% { opacity: 1; transform: translateX(0) scale(1); }
        }
        
        @keyframes targetRight {
            0% { opacity: 0; transform: translateX(100px) scale(0.3); }
            50% { opacity: 1; transform: translateX(-10px) scale(1.1); }
            100% { opacity: 1; transform: translateX(0) scale(1); }
        }
        
        .target-title {
            display: block;
            font-size: 1.4rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        
        .target-value {
            display: block;
            font-size: 2rem;
            font-weight: 800;
            line-height: 1;
        }
        
        .target-1 .target-value {
            color: #ff4d4d;
            text-shadow: 0 0 15px rgba(255,77,77,0.5);
        }
        
        .target-2 .target-value {
            color: #4da6ff;
            text-shadow: 0 0 15px rgba(77,166,255,0.5);
        }
        
        /* МОБИЛЬНАЯ ВЕРСИЯ */
        @media (max-width: 768px) {
            .fighter-test {
                height: 600px;
                border-radius: 30px;
            }
            
            .fighter-container {
                width: 380px;
                height: 520px;
            }
            
            .target {
                min-width: 130px;
                padding: 10px 15px;
            }
            
            .target-title {
                font-size: 1.1rem;
            }
            
            .target-value {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="fighter-test">
        <!-- ИНДИКАТОР ЗАГРУЗКИ -->
        <div class="loader-wrapper" id="loader">
            <div class="loader-text">ЗАГРУЗКА БОЙЦА...</div>
            <div class="loader-spinner"></div>
        </div>
        
        <!-- МОДЕЛЬ ПО ЦЕНТРУ -->
        <div class="fighter-container" id="fighterContainer">
            <model-viewer
                id="fighterModel"
                src="chelovek.glb"
                alt=""
                camera-controls
                autoplay
                loop
                animation-name="0"
                style="width: 100%; height: 100%; background: transparent;">
            </model-viewer>
        </div>
        
        <!-- БЛОКИ (изначально скрыты) -->
        <div class="target target-1" id="target1">
            <span class="target-title">СТРЕСС</span>
            <span class="target-value">-47%</span>
        </div>
        
        <div class="target target-2" id="target2">
            <span class="target-title">ТРЕВОГА</span>
            <span class="target-value">-62%</span>
        </div>
    </div>
    
    <script>
        const model = document.getElementById('fighterModel');
        const loader = document.getElementById('loader');
        const fighterContainer = document.getElementById('fighterContainer');
        const target1 = document.getElementById('target1');
        const target2 = document.getElementById('target2');
        
        // ПОКАЗЫВАЕМ МОДЕЛЬ И БЛОКИ ПОСЛЕ ЗАГРУЗКИ
        model.addEventListener('load', () => {
            console.log('Модель загружена!');
            
            // Прячем загрузчик
            loader.style.opacity = '0';
            
            // Показываем модель
            fighterContainer.classList.add('loaded');
            
            // Ждем окончания анимации загрузчика, потом убираем его
            setTimeout(() => {
                loader.style.display = 'none';
            }, 500);
            
            // Запускаем анимацию блоков
            setTimeout(() => {
                startTargetAnimation();
            }, 300); // Небольшая задержка после появления модели
        });
        
        // АНИМАЦИЯ БЛОКОВ
        function startTargetAnimation() {
            // Сброс анимаций
            target1.style.animation = 'none';
            target2.style.animation = 'none';
            
            // Форсированный reflow
            void target1.offsetWidth;
            
            // Запускаем первую анимацию
            target1.style.animation = 'targetLeft 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards';
            
            // Запускаем вторую с задержкой
            setTimeout(() => {
                target2.style.animation = 'targetRight 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards';
            }, 1000);
            
            // Зацикливаем каждые 4 секунды
            setTimeout(() => {
                startTargetAnimation();
            }, 4000);
        }
    </script>
</body>
</html>
