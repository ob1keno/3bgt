<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Тест: Боец vs Стресс</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
    
    <!-- Model Viewer -->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0f0f;  /* Темный фон для теста */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* ТЕСТОВЫЙ БЛОК - копируй это целиком в свой проект */
        .fighter-test {
            position: relative;
            width: 100%;
            max-width: 390px;  /* Размер мобильного экрана */
            height: 700px;
            margin: 0 auto;
            background: linear-gradient(145deg, #1a2a2a 0%, #0f1a1a 100%);
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        
        /* Контейнер с бойцом */
        .fighter-container {
            position: absolute;
            left: -30px;        /* Сдвиг влево */
            top: 50%;
            transform: translateY(-50%);
            width: 320px;
            height: 450px;
            z-index: 10;
            filter: drop-shadow(0 0 20px rgba(0, 255, 255, 0.3));
        }
        
        model-viewer {
            width: 100%;
            height: 100%;
            --poster-color: transparent;
            background: transparent;
        }
        
        /* Мишени (вылетающие блоки) */
        .target {
            position: absolute;
            right: 25px;
            min-width: 180px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 18px 25px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            border: 3px solid;
            opacity: 0;
            animation: targetAppear 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            z-index: 20;
        }
        
        /* Первая мишень - СТРЕСС */
        .target-1 {
            top: 25%;
            border-color: #ff4d4d;
            animation-delay: 1s;
            box-shadow: 0 0 30px rgba(255, 77, 77, 0.3);
        }
        
        /* Вторая мишень - ТРЕВОГА */
        .target-2 {
            top: 50%;
            border-color: #4da6ff;
            animation-delay: 2.5s;
            box-shadow: 0 0 30px rgba(77, 166, 255, 0.3);
        }
        
        /* Анимация появления с эффектом "удара" */
        @keyframes targetAppear {
            0% {
                opacity: 0;
                transform: translateX(100px) scale(0.3);
            }
            40% {
                opacity: 1;
                transform: translateX(-15px) scale(1.1);
                filter: brightness(1.3);
            }
            70% {
                transform: translateX(5px) scale(0.98);
            }
            100% {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }
        
        /* Эффект "разбивания" при ударе */
        .target::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, transparent 70%);
            border-radius: 30px;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            animation: crackFlash 0.4s ease-out forwards;
            animation-delay: 0.2s;
            pointer-events: none;
        }
        
        @keyframes crackFlash {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 0.6;
            }
            100% {
                transform: translate(-50%, -50%) scale(1.5);
                opacity: 0;
            }
        }
        
        /* Текст внутри мишени */
        .target-title {
            display: block;
            font-size: 1.6rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            line-height: 1.2;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #333, #000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .target-value {
            display: block;
            font-size: 2.2rem;
            font-weight: 800;
            line-height: 1;
        }
        
        .target-1 .target-value {
            color: #ff4d4d;
            text-shadow: 0 0 15px rgba(255, 77, 77, 0.5);
        }
        
        .target-2 .target-value {
            color: #4da6ff;
            text-shadow: 0 0 15px rgba(77, 166, 255, 0.5);
        }
        
        /* Декоративные линии ударов */
        .punch-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15;
        }
        
        .punch-line::before,
        .punch-line::after {
            content: '';
            position: absolute;
            background: linear-gradient(90deg, transparent, #fff, transparent);
            opacity: 0;
            animation: punchFlash 0.3s ease-out forwards;
        }
        
        .punch-line::before {
            top: 30%;
            right: 30%;
            width: 150px;
            height: 3px;
            animation-delay: 1s;
            transform: rotate(-15deg);
        }
        
        .punch-line::after {
            top: 55%;
            right: 25%;
            width: 180px;
            height: 3px;
            animation-delay: 2.5s;
            transform: rotate(10deg);
        }
        
        @keyframes punchFlash {
            0% {
                opacity: 0;
                transform: scale(0.3) rotate(-15deg);
            }
            50% {
                opacity: 1;
                transform: scale(1.2) rotate(-15deg);
            }
            100% {
                opacity: 0;
                transform: scale(1.5) rotate(-15deg);
            }
        }
        
        /* Инструкция внизу */
        .test-note {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.3);
            font-size: 0.8rem;
            z-index: 30;
        }
    </style>
</head>
<body>
    <div class="fighter-test">
        <!-- Контейнер с 3D моделью -->
        <div class="fighter-container">
            <model-viewer
                src="chelovek.glb"  <!-- ВАШ ФАЙЛ С МОДЕЛЬЮ -->
                alt="Боец"
                camera-controls
                autoplay
                loop
                animation-name="*"
                touch-action="pan-y"
                style="width: 100%; height: 100%; background: transparent;">
            </model-viewer>
        </div>
        
        <!-- Блоки-мишени -->
        <div class="target target-1">
            <span class="target-title">СТРЕСС</span>
            <span class="target-value">-47%</span>
        </div>
        
        <div class="target target-2">
            <span class="target-title">ТРЕВОГА</span>
            <span class="target-value">-62%</span>
        </div>
        
        <!-- Декоративные линии ударов -->
        <div class="punch-line"></div>
        
        <!-- Подсказка -->
        <div class="test-note">
            ← Боец слева | Удары с задержкой 1с и 2.5с
        </div>
    </div>
    
    <script>
        // Дополнительная синхронизация при необходимости
        const target1 = document.querySelector('.target-1');
        const target2 = document.querySelector('.target-2');
        
        // Бесконечный цикл анимаций (перезапуск)
        setInterval(() => {
            // Сброс первой мишени
            target1.style.animation = 'none';
            target1.offsetHeight; // форсированный reflow
            target1.style.animation = 'targetAppear 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards';
            
            // Сброс второй мишени с задержкой
            setTimeout(() => {
                target2.style.animation = 'none';
                target2.offsetHeight;
                target2.style.animation = 'targetAppear 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards';
            }, 1500);
            
        }, 5000); // Повтор каждые 5 секунд
    </script>
</body>
</html>
