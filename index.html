<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Тест: Боец vs Стресс</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0f0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .fighter-test {
            position: relative;
            width: 100%;
            max-width: 390px;
            height: 700px;
            margin: 0 auto;
            background: linear-gradient(145deg, #1a2a2a 0%, #0f1a1a 100%);
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        
        .fighter-container {
            position: absolute;
            left: -30px;
            top: 50%;
            transform: translateY(-50%);
            width: 320px;
            height: 450px;
            z-index: 10;
        }
        
        model-viewer {
            width: 100%;
            height: 100%;
            background: transparent;
        }
        
        /* УМЕНЬШЕННЫЕ БЛОКИ */
        .target {
            position: absolute;
            right: 25px;
            min-width: 130px;  /* УМЕНЬШИЛ */
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 10px 15px;  /* УМЕНЬШИЛ */
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            border: 3px solid;
            opacity: 0;
            animation: targetAppear 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            z-index: 20;
        }
        
        .target-1 {
            top: 25%;
            border-color: #ff4d4d;
            animation-delay: 1s;
        }
        
        .target-2 {
            top: 50%;
            border-color: #4da6ff;
            animation-delay: 2.5s;
        }
        
        @keyframes targetAppear {
            0% { opacity: 0; transform: translateX(100px) scale(0.3); }
            40% { opacity: 1; transform: translateX(-15px) scale(1.1); }
            70% { transform: translateX(5px) scale(0.98); }
            100% { opacity: 1; transform: translateX(0) scale(1); }
        }
        
        /* УМЕНЬШЕННЫЙ ТЕКСТ */
        .target-title {
            display: block;
            font-size: 1.2rem;  /* УМЕНЬШИЛ */
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            line-height: 1.2;
            margin-bottom: 3px;
        }
        
        .target-value {
            display: block;
            font-size: 1.6rem;  /* УМЕНЬШИЛ */
            font-weight: 800;
            line-height: 1;
        }
        
        .target-1 .target-value { color: #ff4d4d; }
        .target-2 .target-value { color: #4da6ff; }
        
        .test-note {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.3);
            font-size: 0.8rem;
            z-index: 30;
        }
    </style>
</head>
<body>
    <div class="fighter-test">
        <!-- КОНТЕЙНЕР С МОДЕЛЬЮ -->
        <div class="fighter-container">
            <model-viewer
               src="chelovek.glb"
    alt="Боец"
    camera-controls
    autoplay
    loop
    animation-name="0"  <!-- Часто анимации идут под номерами -->
    style="width: 100%; height: 100%; background: transparent;">
            </model-viewer>
        </div>
     <style>
    /* Дополнительно прячем возможные подписи */
    model-viewer {
        --poster-color: transparent;
        --progress-bar-color: transparent;
    }
    
    /* Если вдруг всплывает какой-то текст */
    model-viewer::part(default-progress-bar) {
        display: none;
    }
</style>       
        <!-- БЛОКИ -->
        <div class="target target-1">
            <span class="target-title">СТРЕСС</span>
            <span class="target-value">-47%</span>
        </div>
        
        <div class="target target-2">
            <span class="target-title">ТРЕВОГА</span>
            <span class="target-value">-62%</span>
        </div>
        
        <div class="test-note">
            Боец слева | Удары с задержкой 1с и 2.5с
        </div>
    </div>
    
    <script>
        // Цикл для повторения анимации
        const target1 = document.querySelector('.target-1');
        const target2 = document.querySelector('.target-2');
        
        setInterval(() => {
            target1.style.animation = 'none';
            target1.offsetHeight;
            target1.style.animation = 'targetAppear 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards';
            
            setTimeout(() => {
                target2.style.animation = 'none';
                target2.offsetHeight;
                target2.style.animation = 'targetAppear 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards';
            }, 1500);
            
        }, 5000);
    </script>
</body>
</html>
