<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Боец vs Стекло</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #1a2a2a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .fighter-test {
            position: relative;
            width: 100%;
            max-width: 1200px;
            height: 700px;
            background: linear-gradient(145deg, #1e2f2f 0%, #142020 100%);
            border-radius: 60px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }
        
        /* ЗАГРУЗЧИК */
        .loader-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #1e2f2f 0%, #142020 100%);
            z-index: 100;
            transition: opacity 0.5s ease;
        }
        
        .loader-text {
            color: white;
            font-size: 1.5rem;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        
        .loader-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #0ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* КОНТЕЙНЕР МОДЕЛИ */
        .fighter-container {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 600px;
            z-index: 10;
            filter: drop-shadow(0 0 30px rgba(0, 255, 255, 0.3));
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        .fighter-container.loaded {
            opacity: 1;
        }
        
        model-viewer {
            width: 100%;
            height: 100%;
            --poster-color: transparent;
            --progress-bar-color: transparent;
            background: transparent;
        }
        
        /* СТЕКЛО (ИЗНАЧАЛЬНО РАЗМЫТО) */
        .glass-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backdrop-filter: blur(8px);
            background: rgba(255, 255, 255, 0.1);
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: backdrop-filter 0.3s ease, background 0.3s ease;
            pointer-events: none;
        }
        
        /* НАДПИСИ НА СТЕКЛЕ */
        .glass-text {
            position: absolute;
            font-size: 4rem;
            font-weight: 800;
            text-transform: uppercase;
            opacity: 0.5;
            color: rgba(255, 255, 255, 0.3);
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
            letter-spacing: 10px;
            transform: rotate(-5deg);
            animation: glassTextPulse 2s infinite;
        }
        
        .glass-text-1 {
            top: 30%;
            left: 20%;
        }
        
        .glass-text-2 {
            bottom: 30%;
            right: 20%;
            transform: rotate(8deg);
            animation-delay: 0.5s;
        }
        
        @keyframes glassTextPulse {
            0% { opacity: 0.3; }
            50% { opacity: 0.6; }
            100% { opacity: 0.3; }
        }
        
        /* ТРЕЩИНЫ НА СТЕКЛЕ */
        .crack {
            position: absolute;
            background: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
            z-index: 25;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        
        .crack-1 {
            top: 40%;
            left: 30%;
            width: 150px;
            height: 3px;
            transform: rotate(25deg);
        }
        
        .crack-2 {
            top: 50%;
            right: 35%;
            width: 180px;
            height: 3px;
            transform: rotate(-15deg);
        }
        
        .crack-3 {
            top: 60%;
            left: 40%;
            width: 120px;
            height: 3px;
            transform: rotate(45deg);
        }
        
        .crack-4 {
            top: 45%;
            right: 40%;
            width: 140px;
            height: 3px;
            transform: rotate(-30deg);
        }
        
        /* ОСКОЛКИ */
        .shatter {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 30;
            pointer-events: none;
        }
        
        .shatter-particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 2px;
            opacity: 0;
        }
        
        /* БЛОКИ (ПОЯВЛЯЮТСЯ ПОСЛЕ УДАРОВ) */
        .target {
            position: absolute;
            min-width: 160px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 15px 25px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 3px solid;
            opacity: 0;
            z-index: 40;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        .target-1 {
            left: 15%;
            top: 30%;
            border-color: #ff4d4d;
        }
        
        .target-2 {
            right: 15%;
            top: 60%;
            border-color: #4da6ff;
        }
        
        @keyframes targetLeft {
            0% { opacity: 0; transform: translateX(-100px) scale(0.3); }
            50% { opacity: 1; transform: translateX(10px) scale(1.1); }
            100% { opacity: 1; transform: translateX(0) scale(1); }
        }
        
        @keyframes targetRight {
            0% { opacity: 0; transform: translateX(100px) scale(0.3); }
            50% { opacity: 1; transform: translateX(-10px) scale(1.1); }
            100% { opacity: 1; transform: translateX(0) scale(1); }
        }
        
        .target-title {
            display: block;
            font-size: 1.4rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: #000;
        }
        
        .target-value {
            display: block;
            font-size: 2rem;
            font-weight: 800;
            line-height: 1;
        }
        
        .target-1 .target-value {
            color: #ff4d4d;
            text-shadow: 0 0 15px rgba(255,77,77,0.5);
        }
        
        .target-2 .target-value {
            color: #4da6ff;
            text-shadow: 0 0 15px rgba(77,166,255,0.5);
        }
        
        /* ВСПЫШКИ УДАРОВ */
        .punch-flash {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 35;
        }
        
        .punch-flash::before,
        .punch-flash::after {
            content: '';
            position: absolute;
            width: 200px;
            height: 4px;
            background: linear-gradient(90deg, transparent, #fff, transparent);
            opacity: 0;
        }
        
        .punch-flash::before {
            left: 30%;
            top: 40%;
            transform: rotate(-10deg);
            animation: punchFlash 0.3s ease-out forwards;
        }
        
        .punch-flash::after {
            right: 30%;
            top: 60%;
            transform: rotate(15deg);
            animation: punchFlash 0.3s ease-out forwards;
            animation-delay: 1s;
        }
        
        @keyframes punchFlash {
            0% { opacity: 0; transform: scale(0.3) rotate(-10deg); }
            50% { opacity: 1; transform: scale(1.2) rotate(-10deg); }
            100% { opacity: 0; transform: scale(1.5) rotate(-10deg); }
        }
        
        /* МОБИЛЬНАЯ ВЕРСИЯ */
        @media (max-width: 768px) {
            .fighter-container {
                width: 280px;
                height: 420px;
            }
            
            .target {
                min-width: 130px;
                padding: 10px 15px;
            }
            
            .target-title {
                font-size: 1.1rem;
            }
            
            .target-value {
                font-size: 1.5rem;
            }
            
            .glass-text {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="fighter-test">
        <!-- ЗАГРУЗЧИК -->
        <div class="loader-wrapper" id="loader">
            <div class="loader-text">ЗАГРУЗКА...</div>
            <div class="loader-spinner"></div>
        </div>
        
        <!-- МОДЕЛЬ -->
        <div class="fighter-container" id="fighterContainer">
            <model-viewer
                id="fighterModel"
                src="chelovek.glb"
                alt=""
                camera-controls
                autoplay
                loop
                animation-name="0"
                style="width: 100%; height: 100%; background: transparent;">
            </model-viewer>
        </div>
        
        <!-- СТЕКЛО (РАЗМЫТОЕ) -->
        <div class="glass-overlay" id="glassOverlay">
            <div class="glass-text glass-text-1">СТРЕСС</div>
            <div class="glass-text glass-text-2">ТРЕВОГА</div>
        </div>
        
        <!-- ТРЕЩИНЫ -->
        <div class="crack crack-1" id="crack1"></div>
        <div class="crack crack-2" id="crack2"></div>
        <div class="crack crack-3" id="crack3"></div>
        <div class="crack crack-4" id="crack4"></div>
        
        <!-- ОСКОЛКИ (будут созданы через JS) -->
        <div class="shatter" id="shatter"></div>
        
        <!-- ВСПЫШКИ УДАРОВ -->
        <div class="punch-flash"></div>
        
        <!-- БЛОКИ -->
        <div class="target target-1" id="target1">
            <span class="target-title">СТРЕСС</span>
            <span class="target-value">-47%</span>
        </div>
        
        <div class="target target-2" id="target2">
            <span class="target-title">ТРЕВОГА</span>
            <span class="target-value">-62%</span>
        </div>
    </div>
    
    <script>
        const model = document.getElementById('fighterModel');
        const loader = document.getElementById('loader');
        const fighterContainer = document.getElementById('fighterContainer');
        const glassOverlay = document.getElementById('glassOverlay');
        const crack1 = document.getElementById('crack1');
        const crack2 = document.getElementById('crack2');
        const crack3 = document.getElementById('crack3');
        const crack4 = document.getElementById('crack4');
        const shatter = document.getElementById('shatter');
        const target1 = document.getElementById('target1');
        const target2 = document.getElementById('target2');
        
        // СОЗДАНИЕ ОСКОЛКОВ
        function createShatterParticles() {
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'shatter-particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.width = Math.random() * 20 + 5 + 'px';
                particle.style.height = Math.random() * 5 + 2 + 'px';
                particle.style.transform = 'rotate(' + Math.random() * 360 + 'deg)';
                particle.style.animation = 'shatterFly ' + (Math.random() * 0.5 + 0.5) + 's ease-out forwards';
                particle.style.animationDelay = Math.random() * 0.2 + 's';
                shatter.appendChild(particle);
            }
        }
        
        // АНИМАЦИЯ ОСКОЛКОВ
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shatterFly {
                0% {
                    opacity: 0;
                    transform: translate(0, 0) rotate(0deg);
                }
                20% {
                    opacity: 1;
                }
                100% {
                    opacity: 0;
                    transform: translate(${Math.random() * 200 - 100}px, ${Math.random() * 200 - 100}px) rotate(${Math.random() * 360}deg);
                }
            }
        `;
        document.head.appendChild(style);
        
        // ПОСЛЕ ЗАГРУЗКИ МОДЕЛИ
        model.addEventListener('load', () => {
            console.log('Модель загружена');
            
            // Прячем загрузчик
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
            }, 500);
            
            // Показываем модель
            fighterContainer.classList.add('loaded');
            
            // Запускаем комбо через 1 секунду
            setTimeout(() => {
                startCombo();
            }, 1000);
        });
        
        // КОМБО УДАРОВ
        function startCombo() {
            // Первый удар - трещина 1
            crack1.style.opacity = '1';
            
            setTimeout(() => {
                // Второй удар - остальные трещины
                crack2.style.opacity = '1';
                crack3.style.opacity = '1';
                crack4.style.opacity = '1';
                
                // Создаем осколки
                createShatterParticles();
                
                // Убираем стекло
                glassOverlay.style.backdropFilter = 'blur(0px)';
                glassOverlay.style.background = 'transparent';
                glassOverlay.style.opacity = '0';
                
                // Показываем блоки
                setTimeout(() => {
                    target1.style.animation = 'targetLeft 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards';
                    
                    setTimeout(() => {
                        target2.style.animation = 'targetRight 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards';
                    }, 400);
                }, 300);
            }, 1000); // Интервал между ударами
        }
    </script>
</body>
</html>
